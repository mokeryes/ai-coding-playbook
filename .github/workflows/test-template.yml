name: Test Template

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint cookiecutter structure
        run: python tools/lint_template.py

  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        primary_language: [python, swift, typescript, go, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install cookiecutter cruft
      - name: Generate project (matrix=${{ matrix.primary_language }})
        run: |
          mkdir -p /tmp/out
          cookiecutter . --no-input \
            --output-dir /tmp/out \
            primary_language=${{ matrix.primary_language }} \
            project_name="Test ${{ matrix.primary_language }}" \
            git_init=no
          echo "--- Generated tree ---"
          find /tmp/out -type f | head -50
          echo "--- CLAUDE.md head ---"
          head -30 /tmp/out/test-${{ matrix.primary_language }}/CLAUDE.md
